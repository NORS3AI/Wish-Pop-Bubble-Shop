<!DOCTYPE html>

<body>
<div id="app">
  <div class="screen" id="screen-start"></div>
  <div class="screen" id="screen-menu"></div>
  <div class="screen" id="screen-admin"></div>
  <div class="screen" id="screen-map"></div>
  <div class="screen" id="screen-well"></div>

<div id="rotate">
  <div class="e">📱</div>
  <h2>Please rotate to portrait</h2>
  <p class="muted">Wish Pop is played upright. Turn your phone back to keep making wishes come true!</p>
</div>

<script src="js/audio.js?v=523"></script>

<script src="js/ui.js?v=523"></script>


<script>
  /* Register the service worker so the game can be installed to the home screen
     and work offline. No notifications are involved. */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
